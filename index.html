<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#667eea">
  <title>🚗 五一自驾游行程</title>
  <script>
    // 检查是否已登录
    if (!sessionStorage.getItem('wuyi_login')) {
      window.location.href = 'login.html';
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/extras.css">
  <link rel="stylesheet" href="css/features.css">
  <!-- 高德地图 JS API -->
  <script src="https://webapi.amap.com/maps?v=1.4.15&key=6a00aea5607e3e7bec6c21b35b2aecbb"></script>
</head>
<body>
  <!-- 浮动爱心背景 -->
  <div class="floating-hearts">
    <div class="floating-heart">💕</div>
    <div class="floating-heart">💖</div>
    <div class="floating-heart">💗</div>
    <div class="floating-heart">💝</div>
    <div class="floating-heart">💘</div>
  </div>

  <!-- 头部 -->
  <header class="header">
    <h1 class="header-title">🚗 小庆一家五一自驾游</h1>
    <p class="header-subtitle">高邮 → 连云港 → 日照 →徐州 · 5天4晚</p>
    <div class="header-stats">
      <div class="header-stat">
        <div class="header-stat-value">5</div>
        <div class="header-stat-label">天行程</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-value">4</div>
        <div class="header-stat-label">座城市</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-value">~1200</div>
        <div class="header-stat-label">公里</div>
      </div>
    </div>
  </header>

  <!-- 温馨欢迎语 -->
  <div class="welcome-banner">
    🌸 一家四口，五一小长假，出发啦！🌸
  </div>

  <!-- 家庭成员 -->
  <section class="family-section" id="family-section"></section>

  <!-- 家庭合影框 -->
  <div class="family-photo-frame">
    <div class="family-photo-text">「 程老师 & 都老师 & 小庆 & 香香 」<br>📍 2026五一 · 山东江苏游</div>
  </div>

  <!-- 行程进度 -->
  <div class="trip-progress">
    <div class="trip-progress-label">
      <span>🚗 行程进度</span>
      <span id="progress-text">0%</span>
    </div>
    <div class="trip-progress-bar">
      <div class="trip-progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- 总览地图 -->
  <section class="overview-section">
    <div class="overview-header">
      <span class="overview-title">🗺️ 全程路线总览</span>
      <span style="font-size:12px;color:#7f8c8d;">点击标记可导航</span>
    </div>
    <div class="overview-map-container">
      <div id="overview-map"></div>
    </div>
  </section>

  <!-- 吸顶快速导航 -->
  <nav class="quick-nav-sticky">
    <div class="quick-nav">
      <button class="quick-nav-btn day-1" onclick="scrollToDay(0)">
        <span>📅</span> Day1
      </button>
      <button class="quick-nav-btn day-2" onclick="scrollToDay(1)">
        <span>📅</span> Day2
      </button>
      <button class="quick-nav-btn day-3" onclick="scrollToDay(2)">
        <span>📅</span> Day3
      </button>
      <button class="quick-nav-btn day-4" onclick="scrollToDay(3)">
        <span>📅</span> Day4
      </button>
      <button class="quick-nav-btn day-5" onclick="scrollToDay(4)">
        <span>📅</span> Day5
      </button>
    </div>
  </nav>

  <!-- 浮动返回顶部按钮 -->
  <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="返回顶部">
    ⬆️
  </button>

  <!-- 爱心按钮 -->
  <button class="love-button" id="loveButton" onclick="sendLove()" title="送爱心">
    ❤️
  </button>

  <!-- 14. 背景音乐按钮 -->
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="背景音乐">
    🎵
  </button>

  <!-- 10. 到达动画容器 -->
  <div class="arrival-celebration" id="arrivalCelebration"></div>

  <!-- 8. 旅行弹幕 -->
  <div class="danmu-container" id="danmuContainer"></div>
  <div class="danmu-input-bar">
    <input type="text" id="danmuInput" placeholder="发一条弹幕..." maxlength="20">
    <button onclick="sendDanmu()">发送</button>
  </div>

  <!-- 11. 旅行天气预报员 -->
  <section id="weather-news-section" style="margin: 0 16px 16px;"></section>

  <!-- 行程内容容器 -->
  <main id="trip-content"></main>

  <!-- 14. 旅行契约 -->
  <section id="contract-section" style="margin: 0 16px 20px;"></section>

  <!-- 15. 返程礼物清单 -->
  <section id="gift-section" style="margin: 0 16px 20px;"></section>

  <!-- 底部实用信息 -->
  <section class="bottom-section">
    <button class="bottom-toggle" onclick="this.classList.toggle('active'); toggleTips()">
      <span>📋 实用信息（行李/驾驶/特产）</span>
      <span class="bottom-toggle-icon">▼</span>
    </button>
    <div class="tips-panel" id="tips-panel">
      <div class="tips-category">
        <div class="tips-category-title">🎒 行李清单</div>
        <ul class="tips-category-list" id="packing-list"></ul>
      </div>
      <div class="tips-category">
        <div class="tips-category-title">🚗 驾驶提示</div>
        <ul class="tips-category-list" id="driving-list"></ul>
      </div>
      <div class="tips-category">
        <div class="tips-category-title">🎁 特产推荐</div>
        <ul class="tips-category-list" id="food-list"></ul>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>🗺️ 点击任意地点的「📍导航」按钮，可直接唤起高德地图</p>
    <p style="margin-top:4px;">建议将本页面添加到手机主屏幕，离线也能查看</p>
  </footer>

  <!-- 脚本 -->
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/poster.js"></script>
  <script>
    // ============================================
    // 渲染行程内容
    // ============================================
    
    function renderTrip() {
      const container = document.getElementById('trip-content');
      const dayColors = ['day-1', 'day-2', 'day-3', 'day-4', 'day-5'];
      
      TRIP_DATA.days.forEach((day, dayIndex) => {
        const colorClass = dayColors[dayIndex];
        
        // 生成时间轴HTML
        let timelineHtml = '';
        day.schedule.forEach(item => {
          const hasNav = item.nav ? true : false;
          let navButton = '';
          if (hasNav) {
            const navName = item.nav.name.replace(/'/g, "\\'");
            const navAddress = (item.nav.address || '').replace(/'/g, "\\'");
            navButton = `
              <button class="nav-btn-inline" onclick="showNavModal({name:'${navName}',lnglat:[${item.nav.lnglat}],address:'${navAddress}'})">
                <span>📍</span> 导航
              </button>
            `;
          }
          
          const foodTags = item.foods ? `
            <div class="food-tags">
              ${item.foods.map(f => `<span class="food-tag">${f}</span>`).join('')}
            </div>
          ` : '';
          
          const tipsList = item.tips ? `
            <ul class="tips-list">
              ${item.tips.map(t => `<li>${t}</li>`).join('')}
            </ul>
          ` : '';
          
          timelineHtml += `
            <div class="timeline-item type-${item.type}">
              <div class="timeline-time">${item.time}</div>
              <div class="timeline-icon">${item.icon}</div>
              <div class="timeline-content">
                <div class="timeline-title">${item.title}</div>
                <div class="timeline-desc">${item.desc}</div>
                ${navButton}
                ${foodTags}
                ${tipsList}
              </div>
            </div>
          `;
        });
        
        // 酒店信息
        const hotelHtml = day.hotel ? `
          <div class="hotel-info">
            <div class="hotel-label">🏨 住宿</div>
            <div class="hotel-name">${day.hotel.name}</div>
            <div class="hotel-tip">${day.hotel.area} · ${day.hotel.tip}</div>
          </div>
        ` : '';
        
        // 单日地图
        const dayMapHtml = `
          <div class="day-map-container" id="day-map-${dayIndex}"></div>
          <button class="day-map-btn" id="day-map-btn-${dayIndex}" onclick="toggleDayMap(${dayIndex})">
            <span>🗺️</span> 查看当日地图
          </button>
        `;
        
        // 获取城市名用于天气和美食
        const cityNames = ['高邮', '连云港', '日照', '徐州', '徐州'];
        const currentCity = cityNames[dayIndex] || '';
        const weatherHtml = renderWeather(dayIndex, currentCity);
        const foodHtml = renderFoodChecklist(currentCity);
        const photoHtml = renderPhotoFrame(`${currentCity} · ${day.theme}`);
        
        // 家庭投票（每天不同主题）
        const voteTopics = [
          { question: '今天午餐吃什么？', options: ['阳春面', '蒲包肉', '咸鸭蛋'] },
          { question: '下午去哪玩？', options: ['海边沙滩', '云台山', '市区逛'] },
          { question: '晚餐选哪家？', options: ['海鲜大排档', '本地菜馆', '小吃街'] },
          { question: '明天早起吗？', options: ['早起看日出', '自然醒', '看心情'] },
          { question: '返程路上停哪？', options: ['服务区', '蚌埠', '直接回'] }
        ];
        const vote = voteTopics[dayIndex];
        const voteHtml = vote ? `
          <div class="family-vote">
            <div class="family-vote-title">🗳️ ${vote.question}</div>
            <div class="vote-options">
              ${vote.options.map(opt => `<button class="vote-btn" onclick="vote('${opt}', this)">${opt}</button>`).join('')}
            </div>
          </div>
        ` : '';
        
        // 里程加油站（每天累积）
        const kmAccumulated = [148, 373, 455, 781, 1139];
        const gasHtml = renderGasStation(kmAccumulated[dayIndex] || 0, 1200);
        
        // 组装卡片
        const cardHtml = `
          <article class="day-card" id="day-${dayIndex}">
            <div class="day-header ${colorClass}">
              <div class="day-header-top">
                <div class="day-number">0${day.day}</div>
                <div class="day-date">
                  <div class="day-date-text">${day.date}</div>
                  <div class="day-weekday">${day.weekday}</div>
                </div>
              </div>
              <div class="day-theme">${day.theme}</div>
              <div class="day-route-info">
                <span>🛣️ ${day.distance}</span>
                <span>⏱️ ${day.driveTime}</span>
              </div>
            </div>
            ${weatherHtml}
            <div class="timeline">
              ${timelineHtml}
            </div>
            ${photoHtml}
            ${foodHtml}
            ${voteHtml}
            ${gasHtml}
            ${hotelHtml}
            ${dayMapHtml}
          </article>
        `;
        
        container.innerHTML += cardHtml;
      });
    }
    
    // ============================================
    // 渲染实用信息
    // ============================================
    
    function renderTips() {
      const packingList = document.getElementById('packing-list');
      const drivingList = document.getElementById('driving-list');
      const foodList = document.getElementById('food-list');
      
      if (TRIP_DATA.tips.packing) {
        packingList.innerHTML = TRIP_DATA.tips.packing.map(t => `<li>${t}</li>`).join('');
      }
      if (TRIP_DATA.tips.driving) {
        drivingList.innerHTML = TRIP_DATA.tips.driving.map(t => `<li>${t}</li>`).join('');
      }
      if (TRIP_DATA.tips.food) {
        foodList.innerHTML = TRIP_DATA.tips.food.map(t => `<li>${t}</li>`).join('');
      }
    }
    
    // ============================================
    // 高德地图 Key 处理
    // ============================================
    
    function loadAmapScript() {
      // 高德地图已在head中加载，直接初始化
      if (typeof AMap !== 'undefined') {
        initOverviewMap();
      } else {
        console.warn('高德地图API未加载');
        showMapFallback();
      }
    }
    
    function showMapFallback() {
      const mapContainer = document.getElementById('overview-map');
      if (mapContainer) {
        // 生成静态路线图HTML
        const routeNodes = [
          { name: '华地伟星龙川时代（合肥）', detail: '起点', type: 'start', nav: {name:'华地伟星龙川时代',lnglat:[117.1285,31.7198],address:'安徽省合肥市肥西县'} },
          { name: '高邮南门大街', detail: 'Day1 · 148km · 1.5h', type: 'day1', nav: {name:'高邮南门大街',lnglat:[119.4365,32.7841],address:'江苏省扬州市高邮市'} },
          { name: '连云港连岛', detail: 'Day1-2 · 225km · 2.5h', type: 'day2', nav: {name:'连岛大沙湾游乐园',lnglat:[119.4608,34.7556],address:'江苏省连云港市连云区'} },
          { name: '日照万平口', detail: 'Day3 · 82km · 1h', type: 'day3', nav: {name:'万平口风景区',lnglat:[119.5389,35.4187],address:'山东省日照市东港区'} },
          { name: '徐州云龙湖', detail: 'Day4 · 326km · 3.5h', type: 'day4', nav: {name:'云龙湖风景区',lnglat:[117.1823,34.2312],address:'江苏省徐州市泉山区'} },
          { name: '华地伟星龙川时代（合肥）', detail: '终点 · 358km · 3.5h', type: 'end', nav: {name:'华地伟星龙川时代',lnglat:[117.1285,31.7198],address:'安徽省合肥市肥西县'} }
        ];
        
        let routeHtml = '<div class="static-route-map">';
        routeHtml += '<div class="static-route-title">📍 全程路线概览（点击可导航）</div>';
        routeHtml += '<div class="static-route-path">';
        
        routeNodes.forEach((node, idx) => {
          const navName = node.nav.name.replace(/'/g, "\\'");
          const navAddr = node.nav.address.replace(/'/g, "\\'");
          routeHtml += `
            <div class="static-route-node">
              <div class="static-route-dot ${node.type}"></div>
              <div class="static-route-info">
                <div class="static-route-name">${node.name}</div>
                <div class="static-route-detail">${node.detail}</div>
              </div>
              <button class="static-route-nav-btn" onclick="showNavModal({name:'${navName}',lnglat:[${node.nav.lnglat}],address:'${navAddr}'})">导航</button>
            </div>
          `;
          if (idx < routeNodes.length - 1) {
            routeHtml += '<div class="static-route-line"></div>';
          }
        });
        
        routeHtml += '</div></div>';
        
        mapContainer.innerHTML = routeHtml + `
          <div class="map-fallback" style="border-top:1px solid #eee;">
            <p style="font-size:13px;line-height:1.8;">
              <strong>🗺️ 地图需要高德Key才能显示完整地图</strong><br>
              1. 访问 <a href="https://lbs.amap.com/" target="_blank" style="color:#667eea;">lbs.amap.com</a> 注册<br>
              2. 创建应用 → 添加Key（Web端JS API）<br>
              3. 将Key填入 index.html 中的 AMAP_CONFIG.key
            </p>
          </div>
        `;
      }
      
      // 同时隐藏所有单日地图按钮
      document.querySelectorAll('.day-map-btn').forEach(btn => {
        btn.style.display = 'none';
      });
    }
    
    // ============================================
    // 初始化
    // ============================================
    
    // 渲染家庭成员
    function renderFamily() {
      const container = document.getElementById('family-section');
      if (!container || !window.FAMILY) return;
      
      container.innerHTML = FAMILY.members.map(m => `
        <div class="family-member">
          <div class="family-emoji">${m.emoji}</div>
          <div class="family-name">${m.name}</div>
          <div class="family-role">${m.role}${m.age ? ' · ' + m.age + '岁' : ''}</div>
          <div class="family-desc" style="background: ${m.color}">${m.desc}</div>
        </div>
      `).join('');
    }
    
    // 每日家庭小贴士
    const FAMILY_TIPS = [
      { emoji: '🚗', text: '小庆司机首日出征！程老师在副驾指点江山~' },
      { emoji: '👩‍🦳', text: '都老师负责监督大家按时吃饭，健康饮食！' },
      { emoji: '📸', text: '香香多拍美照，记录一家人的快乐时光！' },
      { emoji: '👩', text: '香香偶尔换手，让小庆休息休息~' },
      { emoji: '👨‍👩‍👧‍👦', text: '小庆一路平安开回家，全家给你点赞！' }
    ];
    
    function addFamilyTips() {
      TRIP_DATA.days.forEach((day, idx) => {
        const card = document.getElementById(`day-${idx}`);
        if (!card) return;
        
        const tip = FAMILY_TIPS[idx];
        if (!tip) return;
        
        const tipHtml = document.createElement('div');
        tipHtml.className = 'day-family-tip';
        tipHtml.innerHTML = `
          <span class="day-family-tip-emoji">${tip.emoji}</span>
          <span class="day-family-tip-text">${tip.text}</span>
        `;
        
        // 插入到day-header后面
        const header = card.querySelector('.day-header');
        if (header && header.nextSibling) {
          card.insertBefore(tipHtml, header.nextSibling);
        }
      });
    }
    
    // 渲染倒计时
    function renderCountdown() {
      const banner = document.getElementById('countdown-banner');
      if (!banner) return;
      
      const now = new Date();
      const tripStart = new Date('2026-05-01T07:00:00');
      const tripEnd = new Date('2026-05-05T14:00:00');
      
      let label, value;
      
      if (now < tripStart) {
        // 出发前倒计时
        const diff = Math.ceil((tripStart - now) / (1000 * 60 * 60 * 24));
        label = '🎯 距离五一出发还有';
        value = diff;
      } else if (now >= tripStart && now <= tripEnd) {
        // 旅行中
        const dayNum = Math.floor((now - tripStart) / (1000 * 60 * 60 * 24)) + 1;
        label = `🌟 正在旅行中 · 第 ${dayNum} 天`;
        value = 'Enjoy';
        banner.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
      } else {
        // 旅行结束
        const diff = Math.floor((now - tripEnd) / (1000 * 60 * 60 * 24));
        label = '💝 美好回忆已保存';
        value = diff;
        banner.style.background = 'linear-gradient(135deg, #fd79a8, #e84393)';
      }
      
      banner.querySelector('.countdown-label').textContent = label;
      banner.querySelector('#countdown-days').textContent = value;
    }
    
    // 渲染群聊消息
    function renderChat() {
      const container = document.getElementById('chat-messages');
      if (!container || !window.CHAT_MESSAGES) return;
      
      container.innerHTML = CHAT_MESSAGES.map(msg => `
        <div class="chat-message">
          <div class="chat-avatar">${msg.emoji}</div>
          <div class="chat-content">
            <div class="chat-name">${msg.sender}</div>
            <div class="chat-text">${msg.text}</div>
            <div class="chat-time">${msg.time}</div>
          </div>
        </div>
      `).join('');
    }
    
    // 渲染天气卡片
    function renderWeather(dayIndex, cityName) {
      if (!window.WEATHER_DATA || !WEATHER_DATA[cityName]) return '';
      const w = WEATHER_DATA[cityName];
      return `
        <div class="weather-card">
          <div class="weather-icon">${w.icon}</div>
          <div class="weather-info">
            <div class="weather-temp">${cityName} · ${w.temp}</div>
            <div class="weather-mood">${w.mood}</div>
            <div class="weather-clothes">👔 建议: ${w.clothes}</div>
          </div>
        </div>
      `;
    }
    
    // 渲染美食打卡
    function renderFoodChecklist(cityName) {
      if (!window.FOOD_CHECKLIST || !FOOD_CHECKLIST[cityName]) return '';
      const foods = FOOD_CHECKLIST[cityName];
      return `
        <div class="food-checklist">
          <div class="food-checklist-title">🍜 ${cityName}美食打卡</div>
          ${foods.map(f => `
            <div class="food-check-item" onclick="this.classList.toggle('checked')">
              <div class="food-check-box"></div>
              <div class="food-check-text">${f}</div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    // 渲染照片占位框
    function renderPhotoFrame(text) {
      return `
        <div class="photo-frame">
          <div class="photo-frame-corner tl"></div>
          <div class="photo-frame-corner tr"></div>
          <div class="photo-frame-corner bl"></div>
          <div class="photo-frame-corner br"></div>
          <div class="photo-frame-text">📷 ${text}<br><small>旅行后上传照片</small></div>
        </div>
      `;
    }
    
    // 渲染里程加油站
    function renderGasStation(currentKm, totalKm) {
      const pct = Math.round((currentKm / totalKm) * 100);
      return `
        <div class="gas-station">
          <div class="gas-station-header">
            <div class="gas-station-title">⛽ 里程加油站</div>
            <div class="gas-station-value">${currentKm}/${totalKm}km</div>
          </div>
          <div class="gas-station-bar">

    // 渲染语音留言
    function renderVoiceSection() {
      const container = document.getElementById('voice-section');

        container.innerHTML = '<div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#666;">💬 家人寄语</div>' + renderVoiceBubbles();

    }
    
    // 渲染活动追踪
    function renderActivitySection() {
      const container = document.getElementById('activity-section');
      if (container) {
        container.innerHTML = renderActivityTracker();
      }
    }
    
    // 渲染返程倒计时
    function renderHomeCountdown() {
      const container = document.getElementById('home-countdown-section');
      if (!container) return;
      
      const now = new Date();
      const tripEnd = new Date('2026-05-05T14:00:00');
      
      if (now >= tripEnd) {
        container.innerHTML = `
          <div class="home-countdown">
            <div class="home-countdown-emoji">🏠</div>
            <div class="home-countdown-text">已平安到家！</div>
            <div class="home-countdown-sub">都老师准备好晚饭啦~</div>
          </div>
        `;
      } else if (now >= new Date('2026-05-05T08:00:00')) {
        const hoursLeft = Math.ceil((tripEnd - now) / (1000 * 60 * 60));
        container.innerHTML = `
          <div class="home-countdown">
            <div class="home-countdown-emoji">🏠</div>
            <div class="home-countdown-text">预计还有 ${hoursLeft} 小时到家</div>
            <div class="home-countdown-sub">小庆一路平安驾驶，全家等你！</div>
            <div class="home-countdown-distance">358km</div>
          </div>
        `;
      }
    }
    
    // 渲染弹幕
    function initDanmu() {
      const container = document.getElementById('danmuContainer');
      if (!container) return;
      
      const defaultDanmus = [
        '小庆开车稳！🚗',
        '都老师今天吃什么？🍜',
        '香香拍照好看！📸',
        '小庆导航别带错路😄',
        '海边风好大💨',
        '咸鸭蛋真香🥚',
        '程老师注意休息⛽',
        '都老师买特产啦🎁',
        '小庆开车辛苦了💪',
        '香香替换让小庆歇会儿👍',
        '小庆主要开车，安全第一！',
        '程老师导航别带错路😄'
      ];
      
      let index = 0;
      setInterval(() => {
        const danmu = document.createElement('div');
        danmu.className = 'danmu-item';
        danmu.textContent = defaultDanmus[index % defaultDanmus.length];
        danmu.style.top = Math.random() * 80 + 'px';
        container.appendChild(danmu);
        
        setTimeout(() => danmu.remove(), 8000);
        index++;
      }, 2500);
    }
    
    function sendDanmu() {
      const input = document.getElementById('danmuInput');
      const text = input.value.trim();
      if (!text) return;
      
      const container = document.getElementById('danmuContainer');
      const danmu = document.createElement('div');
      danmu.className = 'danmu-item';
      danmu.textContent = text;
      danmu.style.top = Math.random() * 80 + 'px';
      danmu.style.color = '#e74c3c';
      container.appendChild(danmu);
      
      setTimeout(() => danmu.remove(), 8000);
      input.value = '';
    }

    // 渲染礼物清单
    function renderGiftList() {
      const container = document.getElementById('gift-section');
      if (!container) return;
      
      const gifts = [
        { name: '高邮咸鸭蛋', for: '都老师闺蜜', emoji: '🥚' },
        { name: '连云港海鲜干货', for: '程老师同事', emoji: '🦐' },

    document.addEventListener('DOMContentLoaded', () => {
      renderFamily();
      renderWeatherNews();

  </script>
