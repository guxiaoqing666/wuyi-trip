<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 小庆一家五一行程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      width: 90%;
      max-width: 320px;
    }
    .login-emoji {
      font-size: 60px;
      margin-bottom: 16px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }
    .password-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      transition: all 0.3s;
    }
    .password-input:focus {
      border-color: #667eea;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .family-hint {
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-emoji">👨‍👩‍👧‍👦</div>
    <div class="login-title">小庆一家</div>
    <div class="login-subtitle">五一自驾游行程</div>
    <input type="password" class="password-input" id="pwdInput" placeholder="输入密码" maxlength="8">
    <button class="login-btn" onclick="checkPassword()">进入行程</button>
    <div class="error-msg" id="errorMsg">密码错误，请重试</div>
    <div class="family-hint">💡 提示：香香出生年月日</div>
  </div>

  <script>
    function checkPassword() {
      const pwd = document.getElementById('pwdInput').value;
      const error = document.getElementById('errorMsg');
      
      // 密码：香香出生日期 19970404
      if (pwd === '19970404') {
        // 保存登录状态
        sessionStorage.setItem('wuyi_login', 'true');
        // 跳转到主页面
        window.location.href = 'index.html';
      } else {
        error.style.display = 'block';
        document.getElementById('pwdInput').value = '';
        document.getElementById('pwdInput').focus();
      }
    }
    
    // 回车提交
    document.getElementById('pwdInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
