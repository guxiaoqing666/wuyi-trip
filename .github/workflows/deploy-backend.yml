# 后端服务请手动启动：
# cd backend && node server.js
# 或使用: .\scripts\start-backend.ps1
#
# 此工作流已禁用，因为 Self-Hosted Runner 的 PowerShell 执行策略限制
# 如需自动部署，请在 Runner 机器上运行（管理员 PowerShell）：
# Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope LocalMachine

name: Deploy Backend to Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Manual deploy only
        run: echo "Please start backend manually: cd backend && node server.js"
