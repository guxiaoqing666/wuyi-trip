name: Deploy Backend to Self-Hosted Runner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy Backend on Local Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node.js
        shell: powershell
        run: |
          $node = Get-Command node -ErrorAction SilentlyContinue
          if (!$node) {
            Write-Error "Node.js not found!"
            exit 1
          }
          node --version

      - name: Install dependencies
        shell: powershell
        run: |
          cd backend
          if (Test-Path package.json) {
            npm install
          }

      - name: Ensure data directory
        shell: powershell
        run: |
          $dataDir = "$env:USERPROFILE\wuyi-trip\data"
          if (!(Test-Path $dataDir)) {
            New-Item -ItemType Directory -Path $dataDir -Force
          }

      - name: Stop existing backend
        shell: powershell
        run: |
          # 查找并停止 node server.js 进程
          Get-CimInstance Win32_Process | Where-Object { 
            $_.Name -eq 'node.exe' -and $_.CommandLine -like '*server.js*'
          } | ForEach-Object {
            Write-Host "Stopping PID $($_.ProcessId)"
            Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
          }
          
          # 检查端口 3000
          Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue | ForEach-Object {
            Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue
          }
          
          Start-Sleep -Seconds 2

      - name: Start backend
        shell: powershell
        run: |
          $backendDir = "$env:USERPROFILE\wuyi-trip\backend"
          
          # 使用 WMI 创建独立进程（脱离当前会话）
          $cmd = "cd /d `"$backendDir`" && node server.js"
          Invoke-WmiMethod -Class Win32_Process -Name Create -ArgumentList "cmd /c $cmd"
          
          Write-Host "Backend started"
          Start-Sleep -Seconds 3

      - name: Health check
        shell: powershell
        run: |
          $retries = 0
          $maxRetries = 10
          $healthy = $false
          
          while ($retries -lt $maxRetries -and !$healthy) {
            try {
              $res = Invoke-WebRequest -Uri "http://localhost:3000/api/health" -UseBasicParsing -TimeoutSec 3
              if ($res.StatusCode -eq 200) {
                $healthy = $true
                Write-Host "✅ Backend healthy: $($res.Content)"
              }
            } catch {
              $retries++
              Write-Host "Retry $retries/$maxRetries..."
              Start-Sleep -Seconds 2
            }
          }
          
          if (!$healthy) {
            Write-Error "Backend failed to start"
            exit 1
          }

      - name: Verify APIs
        shell: powershell
        run: |
          $apis = @('/api/messages', '/api/stats')
          foreach ($api in $apis) {
            try {
              $res = Invoke-WebRequest -Uri "http://localhost:3000$api" -UseBasicParsing -TimeoutSec 5
              Write-Host "✅ $api : $($res.StatusCode)"
            } catch {
              Write-Error "❌ $api failed"
              exit 1
            }
          }
