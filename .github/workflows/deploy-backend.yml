name: Deploy Backend to Self-Hosted Runner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy Backend on Local Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node.js
        shell: cmd
        run: node --version

      - name: Install dependencies
        shell: cmd
        working-directory: backend
        run: npm install

      - name: Stop existing backend
        shell: cmd
        run: taskkill /F /IM node.exe
        continue-on-error: true

      - name: Start backend in background
        shell: powershell
        run: |
          $proc = Start-Process -FilePath "node" -ArgumentList "server.js" -WorkingDirectory "backend" -PassThru
          Write-Host "Started PID: $($proc.Id)"
          Start-Sleep -Seconds 3

      - name: Health check
        shell: cmd
        run: curl http://localhost:3000/api/health

      - name: Verify APIs
        shell: cmd
        run: curl http://localhost:3000/api/stats
