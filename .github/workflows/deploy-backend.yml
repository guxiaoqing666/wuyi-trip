name: Deploy Java Backend to Self-Hosted Runner

on:
  push:
    branches: [main]
    paths:
      - 'java-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy Java Backend on Local Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Java
        shell: cmd
        run: java -version

      - name: Ensure data directory
        shell: cmd
        run: if not exist "%USERPROFILE%\wuyi-trip\data" mkdir "%USERPROFILE%\wuyi-trip\data"

      - name: Stop existing backend
        shell: cmd
        run: |
          taskkill /F /IM java.exe 2>nul
          taskkill /F /IM node.exe 2>nul
          ping 127.0.0.1 -n 3 >nul

      - name: Start Java backend
        shell: cmd
        run: |
          cd java-backend
          set CP=target\wuyi-trip-backend-1.0.0.jar
          for %%j in (lib\*.jar) do set CP=!CP!;%%j
          start /min java -cp "!CP!" com.wuyi.trip.Application
          ping 127.0.0.1 -n 6 >nul

      - name: Health check
        shell: cmd
        run: |
          curl -s http://localhost:3000/api/health >nul
          if errorlevel 1 (
            ping 127.0.0.1 -n 4 >nul
            curl -s http://localhost:3000/api/health >nul
            if errorlevel 1 exit 1
          )

      - name: Verify APIs
        shell: cmd
        run: |
          curl -s http://localhost:3000/api/messages >nul
          curl -s http://localhost:3000/api/stats >nul
