name: Deploy Backend to Self-Hosted Runner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy Backend on Local Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Ensure data directory exists
        shell: powershell
        run: |
          $dataDir = "C:\Users\simba\wuyi-trip\data"
          if (!(Test-Path $dataDir)) {
            New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
            Write-Host "Created data directory"
          }

      - name: Stop existing backend
        shell: powershell
        run: |
          # 通过 PID 文件停止
          $pidFile = "C:\Users\simba\wuyi-trip\data\backend.pid"
          if (Test-Path $pidFile) {
            $pid = Get-Content $pidFile -Raw
            $pid = $pid.Trim()
            $proc = Get-Process -Id $pid -ErrorAction SilentlyContinue
            if ($proc) {
              Stop-Process -Id $pid -Force
              Write-Host "Stopped process from PID file: $pid"
            }
            Remove-Item $pidFile -Force -ErrorAction SilentlyContinue
          }
          
          # 通过命令行查找
          $processes = Get-CimInstance Win32_Process | Where-Object { $_.CommandLine -like "*backend/server.js*" }
          foreach ($proc in $processes) {
            Write-Host "Stopping process $($proc.ProcessId)"
            Stop-Process -Id $proc.ProcessId -Force -ErrorAction SilentlyContinue
          }
          
          # 检查端口
          $portProcesses = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess -Unique
          foreach ($pid in $portProcesses) {
            if ($pid) {
              Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
              Write-Host "Stopped process using port 3000: $pid"
            }
          }
          
          Start-Sleep -Seconds 2
          Write-Host "Old backend stopped"

      - name: Start backend service
        shell: powershell
        run: |
          $backendPath = "C:\Users\simba\wuyi-trip\backend"
          $dataDir = "C:\Users\simba\wuyi-trip\data"
          
          # 使用 nohup 方式启动后台进程（不阻塞，不重定向到同一文件）
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = "node"
          $psi.Arguments = "server.js"
          $psi.WorkingDirectory = $backendPath
          $psi.UseShellExecute = $false
          $psi.CreateNoWindow = $true
          
          $process = [System.Diagnostics.Process]::Start($psi)
          $procId = $process.Id
          
          Write-Host "Started backend with PID: $procId"
          
          # 保存 PID
          $procId | Out-File -FilePath "$dataDir\backend.pid" -Force
          
          # 等待服务启动
          Start-Sleep -Seconds 3
          
          # 健康检查
          $maxRetries = 10
          $retryCount = 0
          $healthy = $false
          
          while ($retryCount -lt $maxRetries -and !$healthy) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:3000/api/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                $healthy = $true
                Write-Host "✅ Backend is healthy!"
                Write-Host "Response: $($response.Content)"
              }
            } catch {
              $retryCount++
              Write-Host "Health check attempt $retryCount/$maxRetries failed, retrying..."
              Start-Sleep -Seconds 2
            }
          }
          
          if (!$healthy) {
            Write-Error "❌ Backend failed to start"
            exit 1
          }

      - name: Verify deployment
        shell: powershell
        run: |
          # 检查进程
          $proc = Get-CimInstance Win32_Process | Where-Object { $_.CommandLine -like "*backend/server.js*" } | Select-Object -First 1
          if ($proc) {
            Write-Host "✅ Backend process running: PID $($proc.ProcessId)"
          } else {
            Write-Error "❌ Backend process not found"
            exit 1
          }
          
          # 检查端口
          $conn = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue
          if ($conn) {
            Write-Host "✅ Port 3000 is listening"
          } else {
            Write-Error "❌ Port 3000 not listening"
            exit 1
          }
          
          # 测试 API
          try {
            $messages = Invoke-WebRequest -Uri "http://localhost:3000/api/messages" -UseBasicParsing -TimeoutSec 5
            Write-Host "✅ API /api/messages working: $($messages.StatusCode)"
          } catch {
            Write-Error "❌ API /api/messages failed: $($_.Exception.Message)"
            exit 1
          }
          
          try {
            $stats = Invoke-WebRequest -Uri "http://localhost:3000/api/stats" -UseBasicParsing -TimeoutSec 5
            Write-Host "✅ API /api/stats working: $($stats.StatusCode)"
          } catch {
            Write-Error "❌ API /api/stats failed: $($_.Exception.Message)"
            exit 1
          }

      - name: Deployment summary
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "================================"
          Write-Host " ✅ Deployment Complete!"
          Write-Host "================================"
          Write-Host " Backend: http://localhost:3000"
          Write-Host " PID: $(Get-Content C:\Users\simba\wuyi-trip\data\backend.pid -Raw)"
          Write-Host "================================"
