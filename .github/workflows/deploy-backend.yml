name: Deploy Backend to Self-Hosted Runner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    name: Deploy Backend on Local Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node.js
        shell: cmd
        run: node --version

      - name: Install dependencies
        shell: cmd
        run: |
          cd backend
          if exist package.json npm install

      - name: Ensure data directory
        shell: cmd
        run: |
          if not exist "%USERPROFILE%\wuyi-trip\data" mkdir "%USERPROFILE%\wuyi-trip\data"

      - name: Stop existing backend
        shell: cmd
        run: |
          taskkill /F /IM node.exe 2>nul
          timeout /t 2 /nobreak >nul

      - name: Start backend
        shell: cmd
        run: |
          cd backend
          start /min node server.js
          timeout /t 3 /nobreak >nul

      - name: Health check
        shell: cmd
        run: |
          curl -s http://localhost:3000/api/health >nul
          if errorlevel 1 (
            timeout /t 3 /nobreak >nul
            curl -s http://localhost:3000/api/health >nul
            if errorlevel 1 exit 1
          )

      - name: Verify APIs
        shell: cmd
        run: |
          curl -s http://localhost:3000/api/messages >nul
          curl -s http://localhost:3000/api/stats >nul
